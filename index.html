<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Real Krossvord</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    text-align:center;
    color:white;
}

h1{
    text-shadow:2px 2px 5px black;
}

.grid{
    display:grid;
    grid-template-columns:repeat(11,40px);
    justify-content:center;
    gap:2px;
    margin-top:20px;
}

.cell{
    width:40px;
    height:40px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    text-transform:uppercase;
    border-radius:5px;
    border:1px solid #fff;
}

.block{
    background:#222;
    border:none;
}

.correct{background:#2ecc71;}
.wrong{background:#e74c3c;}

.panel{
    margin-top:20px;
    background:white;
    color:black;
    display:inline-block;
    padding:15px;
    border-radius:10px;
    text-align:left;
}

button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#6c5ce7;
    color:white;
}
</style>
</head>

<body>

<h1>🎯 REAL KROSSVORD</h1>

<div class="grid" id="grid"></div>

<div class="panel">
<h3>Savollar</h3>

<div>1. Messi <button onclick="check(0)">Tekshir</button></div>
<div>2. Toshkent <button onclick="check(1)">Tekshir</button></div>
<div>3. ChatGPT <button onclick="check(2)">Tekshir</button></div>

<button onclick="checkAll()">Hammasi</button>
</div>

<script>

const size = 11;

// bo'sh grid
let grid = Array(size).fill().map(()=>Array(size).fill(""));

const words = [
{word:"MESSI", row:5, col:2, dir:"across"},
{word:"TOSHKENT", row:0, col:4, dir:"down"},
{word:"CHATGPT", row:2, col:0, dir:"across"}
];

// joylashtirish
words.forEach((w,wi)=>{
    for(let i=0;i<w.word.length;i++){
        if(w.dir==="across"){
            grid[w.row][w.col+i] = {ch:w.word[i], id:wi};
        }else{
            grid[w.row+i][w.col] = {ch:w.word[i], id:wi};
        }
    }
});

const gridDiv = document.getElementById("grid");

// render
for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){

        let cell = document.createElement("input");
        cell.className="cell";

        if(!grid[r][c]){
            cell.className="cell block";
            cell.disabled=true;
        }else{
            cell.dataset.answer = grid[r][c].ch;
            cell.dataset.word = grid[r][c].id;

            cell.oninput=()=>{
                cell.value = cell.value.toUpperCase();
            }
        }

        gridDiv.appendChild(cell);
    }
}

// bittalik tekshiruv
function check(index){

    let inputs = document.querySelectorAll("input");

    inputs.forEach(inp=>{
        if(inp.dataset.word == index){
            if(inp.value === inp.dataset.answer){
                inp.classList.add("correct");
                inp.classList.remove("wrong");
            }else{
                inp.classList.add("wrong");
                inp.classList.remove("correct");
            }
        }
    });
}

// hammasini tekshirish
function checkAll(){

    let inputs = document.querySelectorAll("input");

    inputs.forEach(inp=>{
        if(inp.dataset.answer){
            if(inp.value === inp.dataset.answer){
                inp.classList.add("correct");
                inp.classList.remove("wrong");
            }else{
                inp.classList.add("wrong");
                inp.classList.remove("correct");
            }
        }
    });
}

</script>

</body>
</html>
