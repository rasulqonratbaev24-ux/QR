<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krossvord O'yini</title>

<style>
    body{
        font-family: Arial;
        background:#f2f2f2;
        text-align:center;
        padding:20px;
    }

    h1{
        color:#333;
    }

    .crossword{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin:auto;
        width:max-content;
    }

    .word{
        display:flex;
        align-items:center;
        gap:10px;
    }

    .number{
        width:30px;
        font-weight:bold;
    }

    .cells{
        display:flex;
        gap:3px;
    }

    input{
        width:35px;
        height:35px;
        text-align:center;
        font-size:20px;
        text-transform:uppercase;
        border:2px solid #888;
        border-radius:5px;
    }

    button{
        margin-top:20px;
        padding:12px 25px;
        font-size:18px;
        background:green;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
    }

    button:hover{
        background:darkgreen;
    }

    .correct{
        background:#7CFC90;
    }

    .wrong{
        background:#ff7b7b;
    }

    .question{
        text-align:left;
        margin-top:30px;
        max-width:700px;
        margin-left:auto;
        margin-right:auto;
        background:white;
        padding:15px;
        border-radius:10px;
    }
</style>
</head>

<body>

<h1>KROSSVORD O'YINI</h1>

<div class="crossword" id="crossword"></div>

<button onclick="checkAnswers()">Tekshirish</button>

<div class="question">
<h3>Savollar:</h3>
<div id="questions"></div>
</div>

<script>

const words = [
    {question:"1. Eng mashhur futbolchi", answer:"MESSI"},
    {question:"2. O'zbekiston poytaxti", answer:"TOSHKENT"},
    {question:"3. Eng katta sayyora", answer:"YUPITER"},
    {question:"4. Futbol o'yini", answer:"FUTBOL"},
    {question:"5. Kompyuter miyasi", answer:"PROTSESSOR"},
    {question:"6. Telefon turi", answer:"SMARTFON"},
    {question:"7. Internet tarmog'i", answer:"WIFI"},
    {question:"8. Eng tez hayvon", answer:"GEPARD"},
    {question:"9. Dasturlash tili", answer:"PYTHON"},
    {question:"10. Mashhur kompaniya", answer:"APPLE"},
    {question:"11. Okean turi", answer:"TINCH"},
    {question:"12. O'qish joyi", answer:"MAKTAB"},
    {question:"13. Yer yo'ldoshi", answer:"OY"},
    {question:"14. Qishda yog'adi", answer:"QOR"},
    {question:"15. Transport vositasi", answer:"MASHINA"},
    {question:"16. Elektron pochta", answer:"EMAIL"},
    {question:"17. Video platforma", answer:"YOUTUBE"},
    {question:"18. Ijtimoiy tarmoq", answer:"INSTAGRAM"},
    {question:"19. Futbol klubi", answer:"BARSELONA"},
    {question:"20. Sun'iy intellekt", answer:"CHATGPT"}
];

const crossword = document.getElementById("crossword");
const questionsDiv = document.getElementById("questions");

words.forEach((wordObj,index)=>{

    const wordDiv = document.createElement("div");
    wordDiv.className = "word";

    const number = document.createElement("div");
    number.className = "number";
    number.innerText = index+1;

    const cells = document.createElement("div");
    cells.className = "cells";

    for(let i=0;i<wordObj.answer.length;i++){

        const input = document.createElement("input");

        input.maxLength = 1;

        input.dataset.answer = wordObj.answer[i];

        input.addEventListener("input",function(){

            this.value = this.value.toUpperCase();

            if(this.value.length === 1){
                const next = this.nextElementSibling;
                if(next){
                    next.focus();
                }
            }

        });

        cells.appendChild(input);
    }

    wordDiv.appendChild(number);
    wordDiv.appendChild(cells);

    crossword.appendChild(wordDiv);

    questionsDiv.innerHTML += `<p>${wordObj.question}</p>`;

});

function checkAnswers(){

    const allInputs = document.querySelectorAll("input");

    allInputs.forEach(input=>{

        if(input.value === input.dataset.answer){
            input.classList.remove("wrong");
            input.classList.add("correct");
        }
        else{
            input.classList.remove("correct");
            input.classList.add("wrong");
        }

    });

}

</script>

</body>
</html>
