<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rangli Krossvord</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
    min-height:100vh;
    text-align:center;
    padding:20px;
}

h1{
    color:white;
    text-shadow:2px 2px 5px black;
}

.crossword{
    display:grid;
    grid-template-columns:repeat(15,45px);
    gap:4px;
    justify-content:center;
    margin-top:30px;
}

.cell{
    width:45px;
    height:45px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    text-transform:uppercase;
    border:2px solid white;
    border-radius:8px;
    background:white;
}

.black{
    background:#333;
    border:none;
}

.correct{
    background:#4CAF50 !important;
    color:white;
}

.wrong{
    background:#ff4d4d !important;
    color:white;
}

.info{
    margin-top:30px;
    background:white;
    display:inline-block;
    padding:20px;
    border-radius:15px;
    text-align:left;
    max-width:700px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    background:#673ab7;
    color:white;
}

button:hover{
    background:#512da8;
}

.wordTitle{
    color:#673ab7;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🎯 RANGLI KROSSVORD</h1>

<div class="crossword" id="board"></div>

<div class="info">
<h2>Savollar</h2>

<p><span class="wordTitle">1.</span> Eng mashhur futbolchi</p>
<p><span class="wordTitle">2.</span> O'zbekiston poytaxti</p>
<p><span class="wordTitle">3.</span> Sun'iy intellekt</p>
<p><span class="wordTitle">4.</span> Video platforma</p>
<p><span class="wordTitle">5.</span> Eng katta sayyora</p>

<button onclick="checkCrossword()">Tekshirish</button>
</div>

<script>

const size = 15;

const board = Array(size).fill().map(()=>Array(size).fill(""));

const words = [
{
    word:"MESSI",
    row:1,
    col:1,
    dir:"across"
},
{
    word:"TOSHKENT",
    row:1,
    col:3,
    dir:"down"
},
{
    word:"CHATGPT",
    row:5,
    col:2,
    dir:"across"
},
{
    word:"YOUTUBE",
    row:3,
    col:8,
    dir:"down"
},
{
    word:"YUPITER",
    row:10,
    col:4,
    dir:"across"
}
];

words.forEach(item=>{

    for(let i=0;i<item.word.length;i++){

        let r=item.row;
        let c=item.col;

        if(item.dir==="across"){
            c+=i;
        }else{
            r+=i;
        }

        board[r][c]=item.word[i];
    }

});

const boardDiv=document.getElementById("board");

for(let r=0;r<size;r++){

    for(let c=0;c<size;c++){

        if(board[r][c]===""){

            const black=document.createElement("div");
            black.className="cell black";
            boardDiv.appendChild(black);

        }else{

            const input=document.createElement("input");

            input.className="cell";

            input.maxLength=1;

            input.dataset.answer=board[r][c];

            input.addEventListener("input",function(){

                this.value=this.value.toUpperCase();

            });

            boardDiv.appendChild(input);
        }
    }
}

function checkCrossword(){

    const inputs=document.querySelectorAll("input");

    inputs.forEach(input=>{

        if(input.value===input.dataset.answer){

            input.classList.remove("wrong");
            input.classList.add("correct");

        }else{

            input.classList.remove("correct");
            input.classList.add("wrong");

        }

    });

}

</script>

</body>
</html>
