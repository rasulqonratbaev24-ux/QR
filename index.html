<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Crossword</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    text-align:center;
}

h1{
    margin-top:10px;
}

.wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(10,45px);
    gap:3px;
    margin-top:10px;
}

.cell{
    width:45px;
    height:45px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    text-transform:uppercase;
    border-radius:6px;
    border:1px solid #fff;
    outline:none;
}

.block{
    background:#111;
    border:none;
}

.correct{background:#2ecc71;color:white;}
.wrong{background:#e74c3c;color:white;}
.active{background:#f1c40f !important;color:black;}

.number{
    position:absolute;
    font-size:10px;
    margin-left:2px;
    margin-top:2px;
    color:black;
}

.cellBox{
    position:relative;
}

.panel{
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    width:90%;
    max-width:500px;
}

button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#6c5ce7;
    color:white;
}
button:hover{opacity:0.8;}
</style>
</head>

<body>

<h1>🎯 PRO CROSSWORD GAME</h1>

<div class="wrapper">

<div class="grid" id="grid"></div>

<div class="panel">
<h3>Savollar</h3>

<div>1. Messi <button onclick="checkWord(0)">Tekshir</button></div>
<div>2. Toshkent <button onclick="checkWord(1)">Tekshir</button></div>
<div>3. ChatGPT <button onclick="checkWord(2)">Tekshir</button></div>

<br>

<button onclick="checkAll()">Hammasi</button>
<button onclick="hint()">💡 Hint</button>
</div>

</div>

<script>

const size = 10;

let grid = Array(size).fill().map(()=>Array(size).fill(null));

const words = [
{word:"MESSI", row:4, col:0, dir:"across", num:1},
{word:"TOSHKENT", row:0, col:2, dir:"down", num:2},
{word:"CHATGPT", row:2, col:2, dir:"across", num:3}
];

// joylashtirish
words.forEach((w,i)=>{
    for(let j=0;j<w.word.length;j++){
        if(w.dir==="across"){
            grid[w.row][w.col+j] = {ch:w.word[j], id:i, num:(j===0?w.num:null)};
        }else{
            grid[w.row+j][w.col] = {ch:w.word[j], id:i, num:(j===0?w.num:null)};
        }
    }
});

const gridDiv = document.getElementById("grid");
let inputs=[];

// render
for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){

        if(!grid[r][c]){
            let div=document.createElement("div");
            div.className="cell block";
            gridDiv.appendChild(div);
        }else{

            let box=document.createElement("div");
            box.className="cellBox";

            let input=document.createElement("input");
            input.className="cell";
            input.maxLength=1;

            input.dataset.answer = grid[r][c].ch;
            input.dataset.word = grid[r][c].id;

            input.oninput=()=>input.value=input.value.toUpperCase();

            input.onclick=()=>highlightWord(input.dataset.word);

            if(grid[r][c].num){
                let n=document.createElement("div");
                n.className="number";
                n.innerText=grid[r][c].num;
                box.appendChild(n);
            }

            box.appendChild(input);
            gridDiv.appendChild(box);

            inputs.push(input);
        }
    }
}

// highlight word
function highlightWord(id){

    document.querySelectorAll("input").forEach(i=>{
        i.classList.remove("active");
        if(i.dataset.word==id){
            i.classList.add("active");
        }
    });
}

// tekshir bitta so'z
function checkWord(id){
    inputs.forEach(i=>{
        if(i.dataset.word==id){
            if(i.value===i.dataset.answer){
                i.classList.add("correct");
                i.classList.remove("wrong");
            }else{
                i.classList.add("wrong");
                i.classList.remove("correct");
            }
        }
    });
}

// hammasi
function checkAll(){
    inputs.forEach(i=>{
        if(i.value===i.dataset.answer){
            i.classList.add("correct");
            i.classList.remove("wrong");
        }else{
            i.classList.add("wrong");
            i.classList.remove("correct");
        }
    });
}

// hint
function hint(){
    let empty = inputs.filter(i=>i.value==="");
    if(empty.length>0){
        let r = empty[Math.floor(Math.random()*empty.length)];
        r.value = r.dataset.answer;
        r.classList.add("correct");
    }
}

</script>

</body>
</html>
